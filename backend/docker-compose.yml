services:
  db:
    image: postgres:16-alpine
    container_name: masterbarang_db
    restart: always
    environment:
      POSTGRES_DB:       masterbarang_db
      POSTGRES_USER:     masterbarang       # ✅ konsisten
      POSTGRES_PASSWORD: M3rakest
    ports:
      - "3306:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init_database.sql:/docker-entrypoint-initdb.d/init_database.sql:ro  # ✅ tambah ini
    networks:
      - masterbarang_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterbarang -d masterbarang_db"]  # ✅ fix typo
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: masterbarang_api
    restart: always
    ports:
      - "1626:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://masterbarang:M3rakest@db:5432/masterbarang_db  # ✅ fix typo
      EVIDENCE_DIR: /app/evidence
    volumes:
      - ./evidence:/app/evidence
    depends_on:
      db:
        condition: service_healthy
    networks:
      - masterbarang_net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: masterbarang_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@masterbarang.com
      PGADMIN_DEFAULT_PASSWORD: M3rakest
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - masterbarang_net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: masterbarang_portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - masterbarang_net

networks:
  masterbarang_net:
    driver: bridge

volumes:
  pg_data:
  pgadmin_data:
  portainer_data:
