services:
  db:
    image: postgres:16-alpine
    container_name: masterbarang_db
    restart: always
    environment:
      POSTGRES_DB:       masterbarang_db
      POSTGRES_USER:     masterbarng
      POSTGRES_PASSWORD: M3rakest
    ports:
      - "3306:5432"    # host:container — akses dari luar pakai port 3306
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - masterbarang_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterbarng -d masterbarang_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: masterbarang_api
    restart: always
    ports:
      - "1626:8000"    # host:container — akses dari luar pakai port 1626
    environment:
      DATABASE_URL: postgresql+asyncpg://masterbarng:M3rakest@db:5432/masterbarang_db
      EVIDENCE_DIR: /app/evidence
    volumes:
      - ./evidence:/app/evidence
    depends_on:
      db:
        condition: service_healthy
    networks:
      - masterbarang_net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: masterbarang_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@masterbarang.local
      PGADMIN_DEFAULT_PASSWORD: M3rakest
    ports:
      - "5050:80"      # akses pgAdmin di http://172.16.170.128:5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - masterbarang_net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: masterbarang_portainer
    restart: always
    ports:
      - "9000:9000"    # akses Portainer di http://172.16.170.128:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - masterbarang_net

networks:
  masterbarang_net:
    driver: bridge

volumes:
  pg_data:
  pgadmin_data:
  portainer_data:
